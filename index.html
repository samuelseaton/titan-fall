<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Colossus Break</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="game-wrapper">
    <div id="hud">
      <div id="hud-lives">♥♥♥</div>
      <div id="hud-score-wrap">
        <span class="hud-label">Score</span>
        <span id="hud-score">0</span>
      </div>
      <div id="hud-speed-wrap">
        <span class="hud-label">Speed</span>
        <div id="hud-speed-bar"><div id="hud-speed-fill"></div></div>
      </div>
    </div>

    <canvas id="canvas" width="900" height="600"></canvas>

    <div id="overlay">
      <h1 id="overlay-title">Colossus Break</h1>
      <p id="overlay-sub"></p>
      <button id="restart-btn">Begin</button>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
